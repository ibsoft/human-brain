<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>First setup | Human-Brain</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/app.css') }}" rel="stylesheet">
</head>
<body class="login-body">
  <form class="login-card" method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="brand mb-3"><i class="fa-solid fa-brain"></i><span>Human-Brain</span></div>
    <p class="text-secondary mb-4">Create the first administrator account.</p>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
      <div class="alert alert-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    <label class="form-label">Name</label>
    <input class="form-control mb-3" name="name" autocomplete="name" placeholder="Administrator" required autofocus>
    <label class="form-label">Email</label>
    <input class="form-control mb-3" name="email" type="email" autocomplete="username" placeholder="admin@example.com" required>
    <label class="form-label">Password</label>
    <input class="form-control mb-3" name="password" type="password" autocomplete="new-password" minlength="12" placeholder="At least 12 characters" required>
    <label class="form-label">Confirm password</label>
    <input class="form-control mb-4" name="confirm_password" type="password" autocomplete="new-password" minlength="12" placeholder="Repeat password" required>
    <button class="btn btn-primary w-100">Create Admin</button>
  </form>
</body>
</html>
