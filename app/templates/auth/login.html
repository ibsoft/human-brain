<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | Human-Brain</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/app.css') }}" rel="stylesheet">
</head>
<body class="login-body">
  <form class="login-card" method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="brand mb-4"><i class="fa-solid fa-brain"></i><span>Human-Brain</span></div>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
      <div class="alert alert-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    <label class="form-label">Email</label>
    <input class="form-control mb-3" name="email" type="email" placeholder="admin@example.com" value="{{ email or '' }}" required autofocus>
    <label class="form-label">Password</label>
    <input class="form-control mb-3" name="password" type="password" placeholder="Your password" required>
    <label class="form-label">MFA code</label>
    <input class="form-control mb-4" name="mfa_code" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" autocomplete="one-time-code" placeholder="{% if mfa_required %}Required{% else %}If enabled{% endif %}">
    <button class="btn btn-primary w-100">Login</button>
  </form>
</body>
</html>
