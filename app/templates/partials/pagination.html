{% if pagination and pagination.pages > 1 %}
<nav class="mt-3">
  <ul class="pagination pagination-sm">
    <li class="page-item {% if not pagination.has_prev %}disabled{% endif %}"><a class="page-link" href="{{ url_for(request.endpoint, page=pagination.prev_num) }}">Prev</a></li>
    {% for page_num in pagination.iter_pages(left_edge=1, right_edge=1, left_current=2, right_current=2) %}
      {% if page_num %}
      <li class="page-item {% if page_num == pagination.page %}active{% endif %}"><a class="page-link" href="{{ url_for(request.endpoint, page=page_num) }}">{{ page_num }}</a></li>
      {% else %}
      <li class="page-item disabled"><span class="page-link">…</span></li>
      {% endif %}
    {% endfor %}
    <li class="page-item {% if not pagination.has_next %}disabled{% endif %}"><a class="page-link" href="{{ url_for(request.endpoint, page=pagination.next_num) }}">Next</a></li>
  </ul>
</nav>
{% endif %}
